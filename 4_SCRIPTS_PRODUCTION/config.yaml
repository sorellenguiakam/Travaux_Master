# ============================================================
# CONFIGURATION GLOBALE - PROJET DT1 CAMEROUN
# ============================================================
# Fichier de configuration centralis\u00e9 pour tous les scripts
# Modifiez les param\u00e8tres ici plut\u00f4t que dans le code
# ============================================================

# --- CHEMINS DE DONN\u00c9ES ---
donnees:
  raw_data: "../2_DONNEES/raw/dataset_dt1_cameroun_synthetic.csv"
  processed_data: "../2_DONNEES/processed/dataset_clean.csv"
  train_data: "../2_DONNEES/processed/train_set.csv"
  test_data: "../2_DONNEES/processed/test_set.csv"
  dossier_resultats: "./resultats/"
  dossier_figures: "../6_MEMOIRE_LATEX/figures/"

# --- PARAM\u00c8TRES PREPROCESSING ---
preprocessing:
  test_size: 0.2  # 20% des donn\u00e9es pour le test
  random_state: 42  # Pour reproductibilit\u00e9
  gestion_valeurs_manquantes: "median"  # Options: median, mean, drop
  normalisation: true  # Activer StandardScaler
  equilibrage_classes: true  # Activer SMOTE pour d\u00e9s\u00e9quilibre
  smote_ratio: 0.5  # Ratio de surech\u00e9chantillonnage

# --- FEATURES \u00c0 UTILISER ---
features:
  biomarqueurs:
    - "ANP32A_IT1"  # Biomarqueur principal
    - "ESCO2"       # Biomarqueur secondaire
    - "NBPF1"       # Biomarqueur tertiaire

  cliniques:
    - "age"
    - "sexe"
    - "IMC"
    - "glycemie_jeun"

  genetiques:
    - "antecedents_familiaux"
    - "ethnie"

  cible: "diagnostic"  # Variable \u00e0 pr\u00e9dire (0=sain, 1=DT1)

# --- MOD\u00c8LES ML ---
modeles:
  # REGRESSION LOGISTIQUE (baseline)
  logistic_regression:
    actif: true
    params:
      C: 1.0
      max_iter: 1000
      penalty: "l2"
      solver: "lbfgs"

  # RANDOM FOREST
  random_forest:
    actif: true
    params:
      n_estimators: 100
      max_depth: 10
      min_samples_split: 5
      min_samples_leaf: 2
      random_state: 42
      n_jobs: -1  # Utiliser tous les CPU

  # XGBOOST
  xgboost:
    actif: true
    params:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 6
      min_child_weight: 1
      subsample: 0.8
      colsample_bytree: 0.8
      gamma: 0
      random_state: 42
      n_jobs: -1

  # LIGHTGBM (plus rapide)
  lightgbm:
    actif: true
    params:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 6
      num_leaves: 31
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
      n_jobs: -1

  # SVM (Support Vector Machine)
  svm:
    actif: false  # D\u00e9sactiv\u00e9 par d\u00e9faut (lent sur gros datasets)
    params:
      C: 1.0
      kernel: "rbf"
      gamma: "scale"

  # K-NEAREST NEIGHBORS
  knn:
    actif: true
    params:
      n_neighbors: 5
      weights: "distance"  # distance ou uniform
      metric: "minkowski"
      n_jobs: -1

# --- OPTIMISATION HYPERPARAM\u00c8TRES ---
optimization:
  methode: "randomized"  # Options: grid, randomized, none
  cv_folds: 5  # Nombre de folds pour validation crois\u00e9e
  n_iter: 20  # Nombre d'it\u00e9rations pour RandomizedSearchCV
  scoring: "recall"  # M\u00e9trique prioritaire (recall pour contexte m\u00e9dical)

  # Grilles de recherche pour RandomizedSearchCV
  grilles:
    random_forest:
      n_estimators: [50, 100, 200, 300]
      max_depth: [5, 10, 15, 20, null]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]

    xgboost:
      n_estimators: [50, 100, 200]
      learning_rate: [0.01, 0.05, 0.1, 0.2]
      max_depth: [3, 5, 7, 9]
      min_child_weight: [1, 3, 5]
      subsample: [0.6, 0.8, 1.0]

# --- M\u00c9TRIQUES D'\u00c9VALUATION ---
evaluation:
  metriques:
    - "accuracy"
    - "precision"
    - "recall"      # PRIORITAIRE en contexte m\u00e9dical
    - "f1_score"
    - "roc_auc"

  seuils:
    recall_minimum: 0.85  # Objectif minimal pour Recall (sensibilit\u00e9)
    accuracy_minimum: 0.75
    roc_auc_minimum: 0.80

# --- INTERPR\u00c9TABILIT\u00c9 ---
interpretabilite:
  shap:
    activer: true
    nombre_echantillons: 100  # Pour calcul SHAP (r\u00e9duire si lent)

  importance_features:
    activer: true
    methode: "auto"  # Options: auto, permutation, shap

# --- VISUALISATIONS ---
visualisations:
  format_figures: "png"  # Options: png, pdf, svg
  dpi: 300  # R\u00e9solution (300 dpi = qualit\u00e9 publication)
  style: "seaborn"  # Style matplotlib

  figures_a_generer:
    - "matrice_confusion"
    - "courbe_roc"
    - "importance_features"
    - "distributions_biomarqueurs"
    - "correlation_matrix"
    - "shap_summary_plot"

# --- RAPPORTS ---
rapports:
  generer_rapport_html: true
  generer_rapport_pdf: false  # N\u00e9cessite LaTeX install\u00e9
  inclure_details_modeles: true
  inclure_interpretabilite: true

# --- SAUVEGARDE MOD\u00c8LES ---
sauvegarde:
  dossier_modeles: "./models/"
  format: "pkl"  # Options: pkl, joblib
  sauvegarder_meilleur_seulement: true
  critere_meilleur: "recall"  # M\u00e9trique pour s\u00e9lectionner le meilleur

# --- MODE DEBUG ---
debug:
  mode_verbose: true  # Afficher logs d\u00e9taill\u00e9s
  afficher_warnings: true
  sauvegarder_intermediaires: true  # Sauvegarder \u00e9tapes interm\u00e9diaires

# --- RESSOURCES COMPUTATIONNELLES ---
ressources:
  memoire_max_gb: 16  # Limite m\u00e9moire (pour \u00e9viter crashes)
  utiliser_gpu: false  # GPU non n\u00e9cessaire pour ce projet
  n_jobs_max: -1  # -1 = utiliser tous les CPU disponibles

# --- CONTEXTE CAMEROUNAIS ---
contexte:
  regions_cameroun:
    - "Centre"  # Yaound\u00e9
    - "Littoral"  # Douala
    - "Ouest"
    - "Nord-Ouest"
    - "Sud-Ouest"
    - "Adamaoua"
    - "Nord"
    - "Extr\u00eame-Nord"
    - "Est"
    - "Sud"

  ethnies_principales:
    - "Bamileke"
    - "Ewondo"
    - "Bassa"
    - "Douala"
    - "Fulani"
    - "Autre"

  seuils_cliniques:
    glycemie_jeun_normal: 5.6  # mmol/L
    glycemie_jeun_prediabete: 6.9  # mmol/L
    glycemie_jeun_diabete: 7.0  # mmol/L
    IMC_surpoids: 25.0
    IMC_obesite: 30.0

# --- NOTES IMPORTANTES ---
# 1. PRIORIT\u00c9 RECALL: En d\u00e9tection pr\u00e9coce DT1, manquer un patient malade
#    (Faux N\u00e9gatif) est plus grave que diagnostiquer \u00e0 tort un patient sain
#    (Faux Positif) car peut entra\u00eener retard traitement et complications mortelles
#
# 2. DONN\u00c9ES SYNTH\u00c9TIQUES: Dataset actuel est synth\u00e9tique, g\u00e9n\u00e9r\u00e9 \u00e0 partir
#    de distributions r\u00e9alistes bas\u00e9es sur litt\u00e9rature scientifique
#
# 3. VALIDATION EXTERNE: Avant tout d\u00e9ploiement clinique, validation sur
#    donn\u00e9es r\u00e9elles camerounaises OBLIGATOIRE
#
# 4. \u00c9THIQUE: Cet outil est une AIDE au diagnostic, pas un remplacement
#    de l'expertise m\u00e9dicale

# --- VERSION ---
version:
  config: "1.0"
  derniere_mise_a_jour: "27 Novembre 2025"
  auteur: "Dr. TCHAPET NJAFA Jean-Pierre avec assistance Claude Code"
